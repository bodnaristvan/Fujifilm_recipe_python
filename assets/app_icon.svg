<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fujifilm Recipe USB Camera App Logo</title>
  <desc id="desc">A modern Windows app logo showing a stylized camera, film recipe card, and USB transfer line.</desc>

  <defs>
    <linearGradient id="bg" x1="128" y1="80" x2="896" y2="944" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102A2B"/>
      <stop offset="0.55" stop-color="#143E3A"/>
      <stop offset="1" stop-color="#0B171A"/>
    </linearGradient>

    <linearGradient id="accent" x1="288" y1="244" x2="735" y2="808" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8C16A"/>
      <stop offset="0.48" stop-color="#D64B3C"/>
      <stop offset="1" stop-color="#6FC3B2"/>
    </linearGradient>

    <linearGradient id="card" x1="273" y1="236" x2="760" y2="783" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F1DD"/>
      <stop offset="1" stop-color="#D7C7A4"/>
    </linearGradient>

    <filter id="shadow" x="91" y="88" width="842" height="858" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
